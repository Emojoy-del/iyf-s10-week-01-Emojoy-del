<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Joy</title>
    <style>
        nav a { margin-right: 1rem; text-decoration: none; color: #0066cc; }
        nav a.active, nav a[aria-current="page"] { font-weight: bold; text-decoration: underline; }
        .contact-details li { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active" aria-current="page">Contact</a>
        </nav>
    </header>
    <main>
        <h1>Contact Joy</h1>
        <form action="#" method="post">
            <fieldset>
                <legend>Personal Information</legend>
                <p>
                    <label for="full-name">Full Name</label><br>
                    <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
                </p>
                <p>
                    <label for="email">Email</label><br>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </p>
                <p>
                    <label for="phone">Phone</label><br>
                    <input type="tel" id="phone" name="phone" placeholder="123-456-7890">
                </p>
            </fieldset>
            <fieldset>
                <legend>Message Details</legend>
                <p>
                    <label for="subject">Subject</label><br>
                    <select id="subject" name="subject" required>
                        <option value="">Choose a subject</option>
                        <option value="general">General Inquiry</option>
                        <option value="support">Support Request</option>
                        <option value="feedback">Feedback</option>
                    </select>
                </p>
                <p>
                    <label for="message">Message</label><br>
                    <textarea id="message" name="message" placeholder="Write your message here..." rows="6" minlength="50" required></textarea>
                </p>
            </fieldset>
            <fieldset>
                <legend>Preferences</legend>
                <p>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to our newsletter</label>
                </p>
            </fieldset>
            <p>
                <button type="submit">Submit</button>
            </p>
        </form>
        <section>
            <h2>Social Media</h2>
            <ul>
                <li><a href="https://twitter.com/" target="_blank" rel="noopener">Twitter</a></li>
                <li><a href="https://www.linkedin.com/" target="_blank" rel="noopener">LinkedIn</a></li>
                <li><a href="https://github.com/" target="_blank" rel="noopener">GitHub</a></li>
            </ul>
        </section>
        <section>
            <h2>Location</h2>
            <ul class="contact-details">
                <li>Location: Nairobi, Kenya</li>
                <li>Timezone: East Africa Time (EAT)</li>
                <li>Working hours: 9:00 AM - 5:00 PM EAT</li>
            </ul>
        </section>
    </main>
</body>
</html>
